<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h1>Ejemplo SVG</h1>
     <svg width = "100" height="100" xmlns="https://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" stroke="green" stoke-width="4" fill="blue"></circle>
     </svg>
    <h1>Ejemplo SVG 2.0</h1>
     <svg width = "100" height="100" xmlns="https://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40"></circle>
     </svg>
     <h1>Ejemplo SVG 3.0</h1>
     <svg width="400" height="180">
    <rect x="50" y="20" rx="20" ry="20" width="150" height="150" style="fill:red;stroke:black;stroke-width:5;opacity:0.5" />
    </svg>
    <h1>Ejemplo SVG 4.0</h1>
    <svg width="100%" height="100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="50" style="fill:red;">
            <animate
                attributeName="cx"
                begin="0s"
                dur="8s"
                from="50"
                to="90%"
                repeatCount="indefinite" />
        </circle>
    </svg>
    <h1>Ejemplo SVG 5.0</h1>
    <svg width="200" height="180" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="30" height="110" width="110" style="stroke:green;fill:red">
            <animateTransform
            attributeName="transform"
            begin="0s"                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
            dur="10s"
            type="rotate"
            from="0 85 85"
            to="360 85 85"
            repeatCount="indefinite" />
        </rect>
</svg>
</body>
</html>
